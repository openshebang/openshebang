{% extends 'base-admin.html' %}

{% block content %}

{% for entry in entries %}



<div class="card my-2">
    <h5 class="card-header">{{entry.title}}</h5>
    <div class="card-body">
        
        <p class="card-text">{{ entry.content }}</p>
   
        <a href="{{ url_for('dib_entry', entry_id=entry.id) }}" class="btn btn-primary stretched-link">Edit...</a>
    </div>
    
    <div class="card-footer text-muted">
        <p>Created by {{ entry.user_id }} on {{ entry.timestamp.strftime('%Y-%M-%d') }} </p>
    </div>
</div>








{% endfor %}

{% endblock content %}
