{% extends 'base-admin.html' %}





{% block content %}
{% for article in articles %}

<div class="card my-2">
    <h5 class="card-header">{{article.title}}</h5>
    <div class="card-body">
        <h5 class="card-title">{{article.subtitle}}</h5>
        <p class="card-text">{{ article.content }}</p>
   
        <a href="{{ url_for('blog_article', article_id=article.id) }}" class="btn btn-primary stretched-link">Edit...</a>
    </div>
    
    <div class="card-footer text-muted">
        <p>Door: <i>{{ article.user_id }}</i> op {{ article.timestamp.strftime('%Y-%M-%d') }} </p>
    </div>
</div>

{% endfor %}



{% endblock content %}
